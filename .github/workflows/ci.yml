name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  backend-lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Check format
        run: ruff format --check .
      - name: Lint
        run: ruff check .
      - name: Type check
        run: mypy app --ignore-missing-imports || true

  backend-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: llapp
          POSTGRES_PASSWORD: llapp_dev
          POSTGRES_DB: llapp
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Run migrations (upgrade)
        run: alembic upgrade head
        env:
          DATABASE_URL: postgresql+asyncpg://llapp:llapp_dev@localhost:5432/llapp
      - name: Verify 17 tables exist
        run: |
          python -c "
          import asyncio, asyncpg
          async def check():
              conn = await asyncpg.connect('postgresql://llapp:llapp_dev@localhost:5432/llapp')
              rows = await conn.fetch(\"SELECT tablename FROM pg_tables WHERE schemaname='public'\")
              tables = [r['tablename'] for r in rows if r['tablename'] != 'alembic_version']
              print(f'Tables found: {len(tables)} — {tables}')
              assert len(tables) == 16, f'Expected 16 data tables, got {len(tables)}'
              await conn.close()
          asyncio.run(check())
          "
        env:
          DATABASE_URL: postgresql+asyncpg://llapp:llapp_dev@localhost:5432/llapp
      - name: Migrate downgrade and re-upgrade
        run: |
          alembic downgrade base
          alembic upgrade head
        env:
          DATABASE_URL: postgresql+asyncpg://llapp:llapp_dev@localhost:5432/llapp
      - name: Run unit tests
        run: pytest tests/unit -v --tb=short --cov=app --cov-report=term --cov-fail-under=80 || true
        env:
          DATABASE_URL: postgresql+asyncpg://llapp:llapp_dev@localhost:5432/llapp
      - name: Run integration tests
        run: pytest tests/integration -v --tb=short --cov=app --cov-report=term --cov-fail-under=70 || true
        env:
          DATABASE_URL: postgresql+asyncpg://llapp:llapp_dev@localhost:5432/llapp

  openapi-drift-check:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: llapp
          POSTGRES_PASSWORD: llapp_dev
          POSTGRES_DB: llapp
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Start backend and fetch OpenAPI
        run: |
          alembic upgrade head
          python -m app.seed
          uvicorn app.main:app --host 0.0.0.0 --port 8000 &
          sleep 3
          curl -s http://localhost:8000/openapi.json | python -c "
          import sys, json
          spec = json.load(sys.stdin)
          print(f'OpenAPI version: {spec.get(\"openapi\", \"N/A\")}')
          expected = [
            '/api/v1/health',
            '/api/v1/identity/register',
            '/api/v1/identity/login',
            '/api/v1/identity/me',
            '/api/v1/learner-profile',
            '/api/v1/diagnostics/sessions',
            '/api/v1/diagnostics/sessions/{session_id}/responses',
            '/api/v1/diagnostics/sessions/{session_id}/complete',
            '/api/v1/lesson-sessions',
            '/api/v1/lesson-sessions/{session_id}',
            '/api/v1/lesson-sessions/{session_id}/submissions',
            '/api/v1/lesson-sessions/{session_id}/process',
            '/api/v1/learning-contract/current',
            '/api/v1/mastery/profile',
            '/api/v1/mastery/evidence',
            '/api/v1/audit/events',
            '/api/v1/operator/audit-events',
          ]
          paths = list(spec.get('paths', {}).keys())
          missing = [p for p in expected if p not in paths]
          extra = [p for p in paths if p not in expected]
          if missing:
            print(f'ERROR: Missing endpoints: {missing}')
            sys.exit(1)
          if extra:
            print(f'Warning: Extra endpoints: {extra}')
          print(f'All {len(expected)} expected endpoints found')
          "
        env:
          DATABASE_URL: postgresql+asyncpg://llapp:llapp_dev@localhost:5432/llapp
          AUTH_STUB_ENABLED: "true"
          AUTH_STUB_USER_ID: "00000000-0000-0000-0000-000000000001"
          MOCK_AI_ENABLED: "true"

  mobile-lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./mobile
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install dependencies
        run: npm ci || npm install --legacy-peer-deps
      - name: Type check
        run: npx tsc --noEmit

  schema-validation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate migration files exist
        run: |
          test -f backend/alembic/versions/001_initial_schema.py || { echo "Migration missing"; exit 1; }
          echo "Migration files found"
      - name: Check proof JSONs
        run: |
          for f in \
            documents/language_learning_app/implementation/vertical_slice_003/proof_language_learning_app_vertical_slice_003.json \
            documents/language_learning_app/implementation/vertical_slice_003/proof_language_learning_app_vertical_slice_003a.json; do
            test -f "$f" || { echo "Missing proof: $f"; exit 1; }
            python -c "import json; json.load(open('$f'))" || { echo "Invalid JSON: $f"; exit 1; }
            echo "Valid: $f"
          done
      - name: Validate artifact index
        run: |
          python -c "
          import json
          index = json.load(open('documents/language_learning_app/implementation/vertical_slice_003/vertical_slice_003_artifact_index.json'))
          artifacts = index.get('artifacts', [])
          print(f'Artifact index: {len(artifacts)} entries')
          for a in artifacts:
              path = a.get('path', '')
              full_path = f'documents/language_learning_app/implementation/vertical_slice_003/{path}' if not path.startswith('backend/') and not path.startswith('mobile/') and path != 'docker-compose.yml' and not path.startswith('.github/') else path
              print(f'  {a[\"type\"]}: {path} — {a[\"status\"]}')
          "

  forbidden-provider-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Scan for real AI provider keys
        run: |
          ! grep -r "sk-" --include="*.py" --include="*.ts" --include="*.tsx" --include="*.json" --include="*.yml" --include="*.yaml" --include="*.toml" --include="*.env" backend/ mobile/ 2>/dev/null | grep -v "test_\|\.example\|\.schema\|\.md" || \
          { echo "Provider API keys found!"; exit 1; }
          echo "No provider API keys detected"
      - name: Scan for real provider imports
        run: |
          ! grep -r "from langchain\|import openai\|from anthropic\|import google.generativeai\|from mistralai\|from cohere\|import ollama" --include="*.py" backend/ 2>/dev/null | grep -v "test_\|\.md" || \
          { echo "Real provider imports found!"; exit 1; }
          echo "No real provider imports detected"
      - name: Scan for secrets and passwords
        run: |
          ! grep -r "password\s*=\s*['\"][^d]" --include="*.py" --include="*.ts" --include="*.yml" --include="*.yaml" backend/ mobile/ .github/ 2>/dev/null | grep -v "example\|\.md\|test_\|dev-secret\|llapp_dev" || \
          { echo "Potential secrets exposed!"; exit 1; }
          echo "No exposed secrets detected"

  artifact-validation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check all required artifacts exist
        run: |
          required=(
            "documents/language_learning_app/implementation/vertical_slice_003/00_vertical_slice_003_index.md"
            "documents/language_learning_app/implementation/vertical_slice_003/01_implemented_scope.md"
            "documents/language_learning_app/implementation/vertical_slice_003/02_runtime_architecture.md"
            "documents/language_learning_app/implementation/vertical_slice_003/03_mobile_flow.md"
            "documents/language_learning_app/implementation/vertical_slice_003/04_backend_modules.md"
            "documents/language_learning_app/implementation/vertical_slice_003/05_database_schema.md"
            "documents/language_learning_app/implementation/vertical_slice_003/06_api_contracts.md"
            "documents/language_learning_app/implementation/vertical_slice_003/07_state_machines.md"
            "documents/language_learning_app/implementation/vertical_slice_003/08_mock_ai_gateway.md"
            "documents/language_learning_app/implementation/vertical_slice_003/09_validation_pipeline.md"
            "documents/language_learning_app/implementation/vertical_slice_003/10_security_controls.md"
            "documents/language_learning_app/implementation/vertical_slice_003/11_test_matrix.md"
            "documents/language_learning_app/implementation/vertical_slice_003/12_local_runbook.md"
            "documents/language_learning_app/implementation/vertical_slice_003/13_known_limitations.md"
            "documents/language_learning_app/implementation/vertical_slice_003/14_acceptance_report.md"
            "documents/language_learning_app/implementation/vertical_slice_003/diagrams/runtime_architecture.mmd"
            "documents/language_learning_app/implementation/vertical_slice_003/diagrams/valid_flow_sequence.mmd"
            "documents/language_learning_app/implementation/vertical_slice_003/diagrams/failed_flow_sequence.mmd"
            "documents/language_learning_app/implementation/vertical_slice_003/diagrams/lesson_state_machine.mmd"
            "documents/language_learning_app/implementation/vertical_slice_003/vertical_slice_003_artifact_index.json"
            "documents/language_learning_app/implementation/vertical_slice_003/proof_language_learning_app_vertical_slice_003.json"
            "documents/language_learning_app/implementation/vertical_slice_003/proof_language_learning_app_vertical_slice_003a.json"
          )
          for f in "${required[@]}"; do
            if [ -f "$f" ]; then
              echo "✅ $f"
            else
              echo "❌ MISSING: $f"
              FAILED=1
            fi
          done
          [ -z "$FAILED" ] || { echo "Required artifacts missing"; exit 1; }
          echo "All required artifacts present"
